<head>
	<title id="tabTitle">Level Info</title>
	<meta charset="utf-8">
	<link href="assets/css/browser.css" type="text/css" rel="stylesheet">
	<style>
		img { -webkit-user-drag: none; user-select: none; }
		.statRow { font-size: 2.6vh; margin: 0.3% 0; }
		.statRow img { margin-right: 0.6%; vertical-align: middle; }
		.roundBtn { width: 7.2vh; height: 7.2vh; border-radius: 50%; background: linear-gradient(#7ee639,#3e9e0e); border: 0.45vh solid white; box-shadow: 0 0 0 0.45vh #2c6e08; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-bottom: 1.6vh; }
		.roundBtn:active { transform: scale(0.92); }
		.roundBtn img { width: 60%; height: 60%; }
		.commentRow { background: rgba(0,0,0,0.18); border-radius: 1vh; padding: 1.2vh 1.6vh; margin-bottom: 1vh; text-align: left; }
		.lbRow { display:flex; align-items:center; padding: 0.8vh 1.4vh; border-bottom: 0.15vh solid rgba(0,0,0,0.15); }
		.lbRow:nth-child(odd) { background: rgba(0,0,0,0.08); }
	</style>
</head>
<audio id="menuMusic" src="../assets/music/menuLoop.mp3" loop></audio>
<script>
const music = document.getElementById('menuMusic');
music.currentTime = parseFloat(sessionStorage.getItem('musicTime') || '0');
music.play().catch(()=>{});
setInterval(() => sessionStorage.setItem('musicTime', music.currentTime), 500);
</script>

<body class="levelBG" style="overflow:hidden">

<div id="everything" style="overflow:hidden; height:100%">

	<div style="position:absolute; bottom: 0%; left: 0%; width: 100%">
		<img class="cornerPiece" src="assets/corner.png" width=7%;>
	</div>
	<div style="position:absolute; bottom: 0%; right: 0%; width: 100%; text-align: right;">
		<img class="cornerPiece" src="assets/corner.png" width=7%; style="transform: scaleX(-1)">
	</div>

	<div style="position:absolute; top: 2%; left: 1.5%; width: 10%; height: 25%">
		<img class="gdButton yesClick" id="backButton" src="assets/back.png" height="30%" onclick="window.history.back()">
	</div>

	<!-- right-side round buttons: save, info, comments, leaderboard -->
	<div style="position:absolute; top: 3%; right: 3%; display:flex; flex-direction:column; align-items:center">
		<div class="roundBtn" id="saveBtn" title="Save level"><img src="assets/plus.png"></div>
		<div class="roundBtn" id="infoBtn" title="Level info"><img src="assets/view.png"></div>
		<div class="roundBtn" id="commentBtn" title="Comments"><img src="assets/btn-magic.png"></div>
		<div class="roundBtn" id="lbBtn" title="Leaderboard"><img src="assets/trophy.png"></div>
	</div>

	<div id="loading" class="supercenter center">
		<img class="spin noSelect" src="assets/loading.png" height="80">
	</div>

	<div id="content" style="display:none">

		<div class="center" style="position:absolute; top: 3%; left: 0; right: 13%">
			<h1 id="lvlName" style="font-size: 5.2vh"></h1>
			<h2 id="lvlAuthor" class="smaller" style="color:#ffd966; font-size: 3vh"></h2>
		</div>

		<div class="center" style="position:absolute; top: 22%; left: 0; right: 13%; display:flex; justify-content:center; align-items:center; gap: 3vh">

			<div style="text-align:center">
				<img id="diffFace" src="" height="80">
				<h3 id="diffText" style="margin-top: 0.5vh"></h3>
				<h3 id="starText" style="margin-top: 0.2vh"></h3>
			</div>

			<div class="roundBtn" id="playBtn" style="width: 11vh; height: 11vh; cursor:pointer">
				<img src="assets/play.png" style="width:55%; height:55%">
			</div>

			<div style="text-align:left">
				<div class="statRow"><img src="assets/download.png" height="20">&nbsp;<span id="statDownloads"></span></div>
				<div class="statRow"><img src="assets/like.png" height="20">&nbsp;<span id="statLikes"></span></div>
				<div class="statRow"><img src="assets/time.png" height="20">&nbsp;<span id="statLength"></span></div>
				<div class="statRow"><img src="assets/orbs.png" height="20">&nbsp;<span id="statOrbs"></span></div>
			</div>
		</div>

		<div class="brownBox center supercenter" id="descBox" style="top: 47%; width: 60%; padding: 1.5%; display:none">
			<h3 id="lvlDesc" style="font-size: 2.4vh"></h3>
		</div>

		<div class="epicbox center supercenter" id="songBox" style="top: 68%; width: 65%; padding: 1.5%">
			<h2 id="songName" style="font-size: 2.8vh"></h2>
			<h3 id="songAuthor" style="font-size: 2.2vh; color:#ffd966"></h3>
			<h3 style="font-size: 1.9vh; margin-top: 0.5vh">Song ID: <span id="songID"></span></h3>
		</div>

	</div>

	<!-- info popup -->
	<div id="infoPopup" class="popup">
		<div class="brownBox bounce center supercenter" style="width: 80vh; max-height: 70%; overflow-y:auto; padding: 2%">
			<img class="gdButton" src="assets/close.png" width="9%" style="position: absolute; top: -8.5%; left: -5.5vh" onclick="$('#infoPopup').hide()">
			<h1 style="margin-bottom: 2%">Level Info</h1>
			<div id="infoBody" style="text-align:left; font-size: 2.4vh"></div>
		</div>
	</div>

	<!-- comments popup -->
	<div id="commentPopup" class="popup">
		<div class="brownBox bounce center supercenter" style="width: 90vh; height: 65%; padding: 1.5%">
			<img class="gdButton" src="assets/close.png" width="7%" style="position: absolute; top: -8.5%; left: -5.5vh" onclick="$('#commentPopup').hide()">
			<h1 style="margin-bottom: 2%">Comments</h1>
			<div id="commentBody" style="text-align:left; overflow-y:auto; height: 80%; padding: 0 1%"></div>
		</div>
	</div>

	<!-- leaderboard popup -->
	<div id="lbPopup" class="popup">
		<div class="brownBox bounce center supercenter" style="width: 80vh; height: 65%; padding: 1.5%">
			<img class="gdButton" src="assets/close.png" width="7%" style="position: absolute; top: -8.5%; left: -5.5vh" onclick="$('#lbPopup').hide()">
			<h1 style="margin-bottom: 2%">Leaderboard</h1>
			<div id="lbBody" style="text-align:left; overflow-y:auto; height: 80%; padding: 0 1%"></div>
		</div>
	</div>

	<!-- save confirmation popup -->
	<div id="savedPopup" class="popup">
		<div class="brownBox bounce center supercenter" style="width: 45vh; padding: 4%">
			<h1>Saved!</h1>
			<h3 style="margin-top: 1%">This level was added to your saved levels.</h3>
			<img class="gdButton" src="assets/btn-done.png" height="50" style="margin-top: 3%" onclick="$('#savedPopup').hide()">
		</div>
	</div>

</div>

</body>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>

const params = new URLSearchParams(window.location.search)
const levelID = params.get('id')
let lvl = null

function clean(text) { return (text || "").toString().replace(/&/g, "&#38;").replace(/</g, "&#60;").replace(/>/g, "&#62;").replace(/"/g, "&#34;").replace(/'/g, "&#39;") }

fetch(`https://gdbrowser.com/api/level/${levelID}`)
	.then(r => r.ok ? r.json() : Promise.reject())
	.then(data => {
		lvl = data
		$('#loading').hide()
		$('#content').show()

		$('#lvlName').text(lvl.name || "-")
		$('#lvlAuthor').text(`By ${lvl.author || "-"}`)

		$('#diffFace').attr('src', `assets/difficulties/${lvl.difficultyFace || 'unrated'}.png`)
		$('#diffText').text((lvl.difficulty || "").includes('Demon') ? "Demon" : (lvl.difficulty || ""))
		if (lvl.stars > 0) $('#starText').html(`${lvl.stars}<img src="assets/star.png" height="14" style="vertical-align:middle; margin-left:0.3vh">`)

		$('#statDownloads').text(lvl.downloads ?? 0)
		$('#statLikes').text(lvl.likes ?? 0)
		$('#statLength').text(lvl.length || "-")
		$('#statOrbs').text(lvl.orbs ?? 0)

		if (lvl.description) { $('#lvlDesc').text(lvl.description); $('#descBox').show() }

		$('#songName').text(clean(lvl.songName || "Unknown"))
		$('#songAuthor').text(lvl.songAuthor ? `By ${lvl.songAuthor}` : "")
		$('#songID').text(lvl.songID ?? "-")

		// info popup body
		const infoRows = [
			["Level ID", lvl.id],
			["Level Version", lvl.levelVersion],
			["Game Version", lvl.gameVersion],
			["Object Count", lvl.objects],
			["Requested Stars", lvl.requestedStars],
			["Password", lvl.password === null ? "Not copyable" : (lvl.password || "Free to copy")],
			["Upload Date", lvl.uploadDate],
			["Last Updated", lvl.updateDate],
			["Original", lvl.original || "N/A"]
		]
		$('#infoBody').html(infoRows.map(r => `<p style="margin: 0.6% 0"><b>${r[0]}:</b> ${clean(r[1] ?? "-")}</p>`).join(""))
	})
	.catch(() => {
		$('#loading').hide()
		$('#everything').append('<div class="supercenter center"><h1>Could not load this level</h1></div>')
	})

$('#playBtn').click(() => { if (levelID) window.parent.postMessage({ type: 'WD_PLAY_LEVEL', id: String(levelID) }, '*') })

$('#saveBtn').click(() => {
	if (!lvl) return
	let saved = []
	try { saved = JSON.parse(localStorage.getItem('wdSavedLevels') || '[]') } catch(e) {}
	if (!saved.some(s => String(s.id) === String(lvl.id))) {
		saved.push({ id: lvl.id, name: lvl.name, author: lvl.author, difficultyFace: lvl.difficultyFace, stars: lvl.stars, difficulty: lvl.difficulty })
		localStorage.setItem('wdSavedLevels', JSON.stringify(saved))
	}
	$('#savedPopup').show()
})

$('#infoBtn').click(() => { if (lvl) $('#infoPopup').show() })

$('#commentBtn').click(() => {
	if ($('#commentBody').is(':empty')) {
		$('#commentBody').html('<h3>Loading...</h3>')
		fetch(`https://gdbrowser.com/api/comments/${levelID}?count=30`)
			.then(r => r.ok ? r.json() : Promise.reject())
			.then(comments => {
				if (!Array.isArray(comments) || comments.length === 0) { $('#commentBody').html('<h3>No comments yet.</h3>'); return }
				$('#commentBody').html(comments.map(c => `
					<div class="commentRow">
						<h3 style="color:#ffd966">${clean(c.username || c.author || "Player")} <span style="color:white; font-weight:normal; font-size:0.8em">(${c.likes ?? 0} likes)</span></h3>
						<p>${clean(c.comment || c.text || "")}</p>
					</div>
				`).join(""))
			})
			.catch(() => $('#commentBody').html('<h3>Could not load comments.</h3>'))
	}
	$('#commentPopup').show()
})

$('#lbBtn').click(() => {
	if ($('#lbBody').is(':empty')) {
		$('#lbBody').html('<h3>Loading...</h3>')
		fetch(`https://gdbrowser.com/api/leaderboard/${levelID}?count=30`)
			.then(r => r.ok ? r.json() : Promise.reject())
			.then(board => {
				if (!Array.isArray(board) || board.length === 0) { $('#lbBody').html('<h3>No leaderboard entries.</h3>'); return }
				$('#lbBody').html(board.map((p, i) => `
					<div class="lbRow">
						<h3 style="width: 10%">#${i + 1}</h3>
						<h3 style="width: 50%; color:#ffd966">${clean(p.username || p.player || "-")}</h3>
						<h3 style="width: 40%; text-align:right">${p.percent ?? p.percentage ?? "-"}%</h3>
					</div>
				`).join(""))
			})
			.catch(() => $('#lbBody').html('<h3>Could not load leaderboard.</h3>'))
	}
	$('#lbPopup').show()
})

$(document).keydown(function(k) {
	if (k.keyCode == 27) {
		if ($('.popup').is(':visible')) $('.popup').hide()
		else window.history.back()
	}
})

$(window).resize(function() {
	if (window.innerHeight > window.innerWidth - 75) $('#everything').hide()
	else $('#everything').show()
})
$(document).ready(function() { $(window).trigger('resize') })

</script>
