<head>
	<title id="tabTitle">Featured</title>
	<meta charset="utf-8">
	<link href="assets/css/browser.css" type="text/css" rel="stylesheet">
	<style>
    #searchBox::-webkit-scrollbar { display: none; }
    #searchBox { scrollbar-width: none; -ms-overflow-style: none; }
    img { -webkit-user-drag: none; user-select: none; }
</style>
</head>
<audio id="menuMusic" src="../assets/music/menuLoop.mp3" loop></audio>
<script>
// same music-continuity trick as search.html/results.html — keep the menu
// loop playing across this html swap instead of restarting it
const music = document.getElementById('menuMusic');
music.currentTime = parseFloat(sessionStorage.getItem('musicTime') || '0');
music.play().catch(()=>{});
setInterval(() => sessionStorage.setItem('musicTime', music.currentTime), 500);
</script>

<body class="levelBG" style="overflow:hidden">

<div id="everything" style="overflow: auto;">

	<div style="position:absolute; bottom: 0%; left: 0%; width: 100%">
		<img class="cornerPiece" src="assets/corner.png" width=7%;>
	</div>
	<div style="position:absolute; bottom: 0%; right: 0%; width: 100%; text-align: right;">
		<img class="cornerPiece" src="assets/corner.png" width=7%; style="transform: scaleX(-1)">
	</div>

	<div id="searchBox" class="supercenter dragscroll">
		<div style="height: 4.5%"></div>
	</div>

	<div class="epicbox supercenter gs" style="width: 120vh; height: 80%; pointer-events: none;"></div>

	<div class="center" style="position:absolute; top: 4.5%; left: 0%; right: 0%; width: 100%">
		<img src="assets/header/featuredLabel.png" style="height: 6.5vh; image-rendering: pixelated;">
	</div>

	<div style="text-align: right; position:absolute; top: 1%; right: 2%">
		<h2 class="smaller" style="font-size: 4.5vh" id="pagenum"></h2>
	</div>

	<div style="position:absolute; top: 2%; left: 1.5%; width: 10%; height: 25%; pointer-events: none">
		<img class="gdButton yesClick" id="backButton" src="assets/back.png" height="30%" onclick="window.parent.postMessage({type:'WD_CLOSE_SEARCH'},'*')">
	</div>

	<div style="position: absolute; left: 7%; top: 45%; height: 10%;">
		<img class="gdButton" id="pageDown" style="display: none" src="assets/arrow-left.png" height="90%">
	</div>
	<div style="position: absolute; right: 7%; top: 45%; height: 10%;">
		<img class="gdButton" id="pageUp" style="display: none" src="assets/arrow-right.png" height="90%">
	</div>

	<div class="supercenter" id="loading" style="height: 10%; top: 47%; display: none;">
		<img class="spin noSelect" src="assets/loading.png" height="105%">
	</div>

	<div id="savedToast" class="center supercenter" style="display:none; top: 90%; background: rgba(0,0,0,0.7); border-radius: 1.5vh; padding: 1vh 3vh; z-index: 50">
		<h3 style="color:#ffd966">Level saved!</h3>
	</div>

</div>

</body>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="text/javascript" src="dragscroll.js"></script>
<script>

$('#pageDown').hide()
$('#pageUp').hide()

// featured list only - fixed type=6, no query/search bar
let page = 0
let loading = false
let pageCache = {}

let searchFilters = `https://gdbrowser.com/api/search/*?page=[PAGE]&count=10&type=6`

function clean(text) {return (text || "").toString().replace(/&/g, "&#38;").replace(/</g, "&#60;").replace(/>/g, "&#62;").replace(/=/g, "&#61;").replace(/"/g, "&#34;").replace(/'/g, "&#39;")}

function Append(firstLoad) {

	loading = true;
	$('#pagenum').text(`Page ${page + 1}`)
	$('#searchBox').html('<div style="height: 4.5%"></div>')
	$('#loading').show()

	if (page == 0) $('#pageDown').hide()
	else $('#pageDown').show()

	if (pageCache[page]) appendLevels(pageCache[page])
	else fetch(searchFilters.replace("[PAGE]", page))
		.then(r => r.ok ? r.json() : Promise.reject())
		.then(appendLevels)
		.catch(() => { $('#loading').hide(); $('#searchBox').html('<div style="text-align:center;padding:8%"><h1>Could not load results</h1></div>'); loading = false })

	function appendLevels(res) {

	if (res == '-1' || res.length == 0) { $('#loading').hide(); $('#pageUp').hide(); return loading = false }
	pageCache[page] = res

	$('#pageUp').show()

	res.forEach((x, y) => {

		let filteredSong = clean((x.songName || "").replace(/[^ -~]/g, ""))
		if (!filteredSong) filteredSong = clean(x.songName)
		let songColor = x.customSong == 0 ? "blue" : "whatIfItWasPurple"
		let noLink = songColor != "whatIfItWasPurple"

		// local difficulty images from the gdbrowser assets folder, no CDN
		let diffSrc = `assets/difficulties/${x.difficultyFace || 'unrated'}.png`

		// view button - opens the level info page (gdbrowser style), not direct play
		let viewBtn = `<a title="View level"><img style="margin-bottom: 4.5%" class="valign gdButton" src="assets/view.png" height="105%" onclick="location.href='level-info.html?id=${clean(String(x.id))}'"></a>`
		let saveBtn = `<img title="Save level" class="valign gdButton" src="assets/plus.png" height="60%" style="margin-left: 1.5vh; cursor:pointer" onclick="saveLevel(event, ${clean(String(x.id))}, '${clean(x.name)}', '${clean(x.author)}', '${clean(x.difficultyFace)}', ${x.stars || 0}, '${clean(x.difficulty)}')">`

		$('#searchBox').append(`<div class="searchResult" title="${clean(x.description)}">
			<h1 class="lessspaced pre" style="width: fit-content; padding-right: 1%">${clean(x.name || " ")}</h1>
			<h2 class="pre smaller inline gdButton help"><!--
				-->${(x.accountID != "0") ? `<a style="margin-right: 0.66vh" href="https://gdbrowser.com/u/${x.accountID}." target="_blank">By ${x.author || "-"}</a>` : `By ${x.author || "-"}`}</h2>
			<h3 class="lessSpaced help ${noLink ? "" : "gdButton "}pre ${songColor}" style="overflow: hidden; max-height: 19%; width: fit-content; padding: 1% 1% 0% 0%">${filteredSong}</h3>
			<h3 class="lessSpaced" style="width: fit-content">
				<img class="help valign rightSpace" title="Length" src="assets/time.png" height="14%">${x.length}
				<img class="help valign rightSpace" title="Downloads" src="assets/download.png" height="14%">${x.downloads}
				<img class="help valign rightSpace" title="Likes" src="assets/${x.disliked ? 'dis' : ''}like.png" height="14%">${x.likes}
				${x.orbs != 0 ? `<img class="help valign rightSpace" title="Mana Orbs" src="assets/orbs.png" height="14%">${x.orbs}` : ""}
			</h3>

<div class="center" style="position:absolute; top: ${6.5 + (y * 33.5) + (x.coins == 0 ? 2.5 : 0)}%; left: 4.4%; transform:scale(0.82); height: 10%; width: 12.5%;">
	<img class="help spaced" title="${x.difficulty}${x.mythic ? " (Mythic)" : x.legendary ? " (Legendary)" : x.epic ? " (Epic)" : x.featured ? " (Featured)" : ""}" src="${diffSrc}" height="150%" style="margin-bottom: 0%; position: relative; z-index: 1; ${x.mythic || x.legendary ? 'transform:scale(1.45);' : x.epic ? 'transform:scale(1.25);' : x.featured ? 'transform:scale(1.1);' : ''}">
	<h3 style="margin-top:0.8vh; position: relative; z-index: 2;">
		${(x.difficulty || "").includes('Demon') ? "Demon" : x.difficulty}
	</h3>
	${x.stars != 0 ? `<h3 class="help" title="${x.stars} star${x.stars == 1 ? "" : "s"}" style="position: relative; z-index: 2;">${x.stars}<img class="valign sideSpaceB" src="assets/star.png" height="35%" style="transform:translateY(-8%)"></h3>` : ""}
	<div id="coins" style="margin-top: 3%; position: relative; z-index: 2;" title="${x.coins} user coin${x.coins == 1 ? "" : "s"} (${x.verifiedCoins ? "" : "un"}verified)">
		${x.coins > 0 ? `<img src="assets/${x.verifiedCoins ? 'silver' : 'brown'}coin.png" height="50%" class="help">` : ""}
		${x.coins > 1 ? `<img src="assets/${x.verifiedCoins ? 'silver' : 'brown'}coin.png" height="50%" class="help squeezeB">` : ""}
		${x.coins > 2 ? `<img src="assets/${x.verifiedCoins ? 'silver' : 'brown'}coin.png" height="50%" class="help squeezeB">` : ""}
	</div>
</div>
			<div class="center" style="position:absolute; right: 7%; transform:translateY(-16.25vh); height: 10%">
				${viewBtn}${saveBtn}
				<p title="Level ID" style="text-align: right; color: rgba(0, 0, 0, 0.4); font-size: 2.2vh; transform: translate(2.8vh, 2.5vh)">#${x.id}</p>
			</div>
		</div>`)
	})

	$('#searchBox').append('<div style="height: 4.5%"></div>').scrollTop(0)
	$('#loading').hide()
	loading = false;
	}
}

// quick-save straight from the list row, same localStorage saved levels list
// used by level-info.html's save button
function saveLevel(e, id, name, author, difficultyFace, stars, difficulty) {
	e.stopPropagation()
	let saved = []
	try { saved = JSON.parse(localStorage.getItem('wdSavedLevels') || '[]') } catch(err) {}
	if (!saved.some(s => String(s.id) === String(id))) {
		saved.push({ id, name, author, difficultyFace, stars, difficulty })
		localStorage.setItem('wdSavedLevels', JSON.stringify(saved))
	}
	$('#savedToast').stop(true, true).css('opacity', 1).show().delay(1200).fadeOut(400)
}

Append(true)

$('#pageUp').click(function() { page += 1; if (!loading) Append() })
$('#pageDown').click(function() { page -= 1; if (!loading) Append() })

$(document).keydown(function(k) {
	if (loading) return;
	if (k.which == 37 && $('#pageDown').is(":visible")) $('#pageDown').trigger('click')
	if (k.which == 39 && $('#pageUp').is(":visible")) $('#pageUp').trigger('click')
	if (k.keyCode == 27) window.parent.postMessage({type:'WD_CLOSE_SEARCH'},'*')
})

$(window).resize(function() {
	if (window.innerHeight > window.innerWidth - 75) $('#everything').hide()
	else $('#everything').show()
})
$(document).ready(function() { $(window).trigger('resize') })

</script>
