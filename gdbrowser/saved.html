<head>
	<title id="tabTitle">Saved Levels</title>
	<meta charset="utf-8">
	<link href="assets/css/browser.css" type="text/css" rel="stylesheet">
	<style>
    #searchBox::-webkit-scrollbar { display: none; }
    #searchBox { scrollbar-width: none; -ms-overflow-style: none; }
    img { -webkit-user-drag: none; user-select: none; }
</style>
</head>
<audio id="menuMusic" src="../assets/music/menuLoop.mp3" loop></audio>
<script>
const music = document.getElementById('menuMusic');
music.currentTime = parseFloat(sessionStorage.getItem('musicTime') || '0');
music.play().catch(()=>{});
setInterval(() => sessionStorage.setItem('musicTime', music.currentTime), 500);
</script>

<body class="levelBG" style="overflow:hidden">

<div id="everything" style="overflow: auto;">

	<div style="position:absolute; bottom: 0%; left: 0%; width: 100%">
		<img class="cornerPiece" src="assets/corner.png" width=7%;>
	</div>
	<div style="position:absolute; bottom: 0%; right: 0%; width: 100%; text-align: right;">
		<img class="cornerPiece" src="assets/corner.png" width=7%; style="transform: scaleX(-1)">
	</div>

	<div id="searchBox" class="supercenter dragscroll">
		<div style="height: 4.5%"></div>
	</div>

	<div class="epicbox supercenter gs" style="width: 120vh; height: 80%; pointer-events: none;"></div>

	<div class="center" style="position:absolute; top: 8%; left: 0%; right: 0%">
		<h1 id="header">Saved Levels</h1>
	</div>

	<div style="position:absolute; top: 2%; left: 1.5%; width: 10%; height: 25%; pointer-events: none">
		<img class="gdButton yesClick" id="backButton" src="assets/back.png" height="30%" onclick="window.parent.postMessage({type:'WD_CLOSE_SEARCH'},'*')">
	</div>

</div>

</body>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="text/javascript" src="dragscroll.js"></script>
<script>

function clean(text) { return (text || "").toString().replace(/&/g, "&#38;").replace(/</g, "&#60;").replace(/>/g, "&#62;").replace(/=/g, "&#61;").replace(/"/g, "&#34;").replace(/'/g, "&#39;") }

let saved = []
try { saved = JSON.parse(localStorage.getItem('wdSavedLevels') || '[]') } catch(e) {}

if (saved.length === 0) {
	$('#searchBox').append(`<div style="text-align:center; padding: 12% 0"><h1>No saved levels yet</h1><h3 style="margin-top:1.5%">Press the + button on a level to save it here.</h3></div>`)
} else {
	saved.forEach((x, y) => {
		let diffSrc = `assets/difficulties/${x.difficultyFace || 'unrated'}.png`
		$('#searchBox').append(`<div class="searchResult" title="${clean(x.name)}">
			<h1 class="lessspaced pre" style="width: fit-content; padding-right: 1%">${clean(x.name || " ")}</h1>
			<h2 class="pre smaller inline gdButton help">By ${clean(x.author || "-")}</h2>

<div class="center" style="position:absolute; top: ${10 + (y * 33.5)}%; left: 4.4%; transform:scale(0.82); height: 10%; width: 12.5%;">
	<img class="help spaced" title="${x.difficulty || ""}" src="${diffSrc}" height="150%" style="position: relative; z-index: 1;">
	<h3 style="margin-top:0.8vh; position: relative; z-index: 2;">
		${(x.difficulty || "").includes('Demon') ? "Demon" : (x.difficulty || "")}
	</h3>
	${x.stars > 0 ? `<h3 class="help" title="${x.stars} stars" style="position: relative; z-index: 2;">${x.stars}<img class="valign sideSpaceB" src="assets/star.png" height="35%" style="transform:translateY(-8%)"></h3>` : ""}
</div>

			<div class="center" style="position:absolute; right: 7%; transform:translateY(-10vh); height: 10%; display:flex; align-items:center; gap: 1.5vh">
				<a title="View level"><img class="valign gdButton" src="assets/view.png" height="42" onclick="location.href='level-info.html?id=${clean(String(x.id))}'"></a>
				<img title="Remove from saved" class="valign gdButton" src="assets/close.png" height="32" style="cursor:pointer" onclick="removeSaved(${clean(String(x.id))})">
				<p title="Level ID" style="text-align: right; color: rgba(0, 0, 0, 0.4); font-size: 2.2vh">#${x.id}</p>
			</div>
		</div>`)
	})
	$('#searchBox').append('<div style="height: 4.5%"></div>')
}

function removeSaved(id) {
	saved = saved.filter(s => String(s.id) !== String(id))
	localStorage.setItem('wdSavedLevels', JSON.stringify(saved))
	location.reload()
}

$(document).keydown(function(k) {
	if (k.keyCode == 27) window.parent.postMessage({type:'WD_CLOSE_SEARCH'},'*')
})

$(window).resize(function() {
	if (window.innerHeight > window.innerWidth - 75) $('#everything').hide()
	else $('#everything').show()
})
$(document).ready(function() { $(window).trigger('resize') })

</script>
