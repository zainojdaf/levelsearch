<head>
	<title id="tabTitle">Saved Levels</title>
	<meta charset="utf-8">
	<link href="assets/css/browser.css" type="text/css" rel="stylesheet">
	<style>
    #searchBox::-webkit-scrollbar { display: none; }
    #searchBox { scrollbar-width: none; -ms-overflow-style: none; }
    img { -webkit-user-drag: none; user-select: none; }
</style>
</head>
<audio id="menuMusic" src="../assets/music/menuLoop.mp3" loop></audio>
<script>
const music = document.getElementById('menuMusic');
music.currentTime = parseFloat(sessionStorage.getItem('musicTime') || '0');
music.play().catch(()=>{});
setInterval(() => sessionStorage.setItem('musicTime', music.currentTime), 500);
</script>

<body class="levelBG" style="overflow:hidden">

<div id="everything" style="overflow: auto;">

	<div class="popup" id="purgeDiv">
		<div class="fancybox bounce center supercenter" style="width: 35%; height: 28%">
			<h2 class="smaller center" style="font-size: 5.5vh">Delete All</h2>
			<p class="bigger center" style="line-height: 5vh; margin-top: 1.5vh;">
				Delete all saved online levels?<br><cy>Levels will be cleared from your browser.</cy>
			</p>
			<img src="assets/btn-cancel-green.png" height=25%; class="gdButton center closeWindow">
			<img src="assets/btn-delete.png" height=25%; id="purgeSaved" class="gdButton center sideSpaceB">
		</div>
	</div>

	<div style="position:absolute; bottom: 0%; left: 0%; width: 100%">
		<img class="cornerPiece" src="assets/corner.png" width=7%;>
	</div>
	<div style="position:absolute; bottom: 0%; right: 0%; width: 100%; text-align: right;">
		<img class="cornerPiece" src="assets/corner.png" width=7%; style="transform: scaleX(-1)">
	</div>

	<div id="searchBox" class="supercenter dragscroll">
		<div style="height: 4.5%"></div>
	</div>

	<div class="epicbox supercenter gs" style="width: 120vh; height: 80%; pointer-events: none;"></div>

	<div class="center" style="position:absolute; top: 8%; left: 0%; right: 0%">
		<h1 id="header">Saved Levels</h1>
	</div>

	<div style="position:absolute; top: 2%; left: 1.5%; width: 10%; height: 25%; pointer-events: none">
		<img class="gdButton yesClick" id="backButton" src="assets/back.png" height="30%" onclick="window.parent.postMessage({type:'WD_CLOSE_SEARCH'},'*')">
	</div>

	<div id="purge" style="position:absolute; bottom: 1%; right: -3%; width: 10%; display:none;">
		<img class="gdButton" src="assets/delete.png" width="60%" onclick="$('#purgeDiv').show()">
	</div>

</div>

</body>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="text/javascript" src="dragscroll.js"></script>
<script>

function clean(text) { return (text || "").toString().replace(/&/g, "&#38;").replace(/</g, "&#60;").replace(/>/g, "&#62;").replace(/=/g, "&#61;").replace(/"/g, "&#34;").replace(/'/g, "&#39;") }

let saved = []
try { saved = JSON.parse(localStorage.getItem('wdSavedLevels') || '[]') } catch(e) {}

// older saved entries (saved before the full row data was stored) only have
// id/name/author/difficultyFace/stars/difficulty - backfill the rest from the api
async function backfillSaved() {
	let changed = false
	for (let i = 0; i < saved.length; i++) {
		if (saved[i].songName === undefined) {
			try {
				let r = await fetch(`https://gdbrowser.com/api/level/${saved[i].id}`)
				if (r.ok) {
					let d = await r.json()
					saved[i] = { id: d.id, name: d.name, author: d.author, accountID: d.accountID, difficultyFace: d.difficultyFace, stars: d.stars, difficulty: d.difficulty, songName: d.songName, songID: d.songID, length: d.length, downloads: d.downloads, likes: d.likes, orbs: d.orbs, coins: d.coins, verifiedCoins: d.verifiedCoins, twoPlayer: d.twoPlayer, large: d.large, copiedID: d.copiedID }
					changed = true
				}
			} catch(e) {}
		}
	}
	if (changed) localStorage.setItem('wdSavedLevels', JSON.stringify(saved))
	renderSaved()
}

function renderSaved() {

if (saved.length === 0) {
	$('#searchBox').append(`<div style="text-align:center; padding: 12% 0"><h1>No saved levels yet</h1><h3 style="margin-top:1.5%">Press the + button on a level to save it here.</h3></div>`)
} else {
	$('#purge').show()
	saved.slice().reverse().forEach((x, y) => {
		let diffSrc = `assets/difficulties/${x.difficultyFace || 'unrated'}.png`
		let hasAuthor = (x.accountID && x.accountID != "0")

		let filteredSong = clean((x.songName || "").replace(/[^ -~]/g, ""))
		if (!filteredSong) filteredSong = clean(x.songName || "Unknown")

		// view button - opens the level info page, no thumbnail image (matches real gdbrowser row, just no preview pic)
		let viewBtn = `<a title="View level"><img style="margin-bottom: 4.5%" class="valign gdButton" src="assets/view.png" height="105%" onclick="location.href='level-info.html?id=${clean(String(x.id))}'"></a>`
		let removeBtn = `<img title="Remove from saved" class="valign gdButton" src="assets/close.png" height="60%" style="margin-left: 1.5vh; cursor:pointer" onclick="removeSaved(event, ${clean(String(x.id))})">`

		$('#searchBox').append(`<div class="searchResult" title="${clean(x.name)}">
			<h1 class="lessspaced pre" style="width: fit-content; padding-right: 1%">${clean(x.name || " ")}</h1>
			<h2 class="pre smaller inline gdButton help ${hasAuthor ? "" : "green unregistered"}"><!--
				-->${hasAuthor ? `<a style="margin-right: 0.66vh" href="https://gdbrowser.com/u/${x.accountID}." target="_blank">By ${clean(x.author || "-")}</a>` : `By ${clean(x.author || "-")}`}</h2><!--
				--><h2 class="inline" style="margin-left: 1.5%; transform:translateY(30%)">
				${x.copiedID > 0 ? `<img class="help valign sideSpaceD" title="Original: ${x.copiedID}" src="assets/copied.png" height="12%">` : ''}<!--
				-->${x.large ? `<img class="help valign sideSpaceD" title="Contains more than 40,000 objects" src="assets/large.png" height="12%">` : ''}<!--
				-->${x.twoPlayer ? `<img class="help valign sideSpaceD" title="Two player level" src="assets/twoPlayer.png" height="12%">` : ''}
			</h2>
			<h3 class="lessSpaced help pre blue" style="overflow: hidden; max-height: 19%; width: fit-content; padding: 1% 1% 0% 0%">${filteredSong}</h3>
			<h3 class="lessSpaced" style="width: fit-content">
				<img class="help valign rightSpace" title="Length" src="assets/time.png" height="14%">${x.length ?? "-"}
				<img class="help valign rightSpace" title="Downloads" src="assets/download.png" height="14%">${x.downloads ?? 0}
				<img class="help valign rightSpace" title="Likes" src="assets/like.png" height="14%">${x.likes ?? 0}
				${x.orbs ? `<img class="help valign rightSpace" title="Mana Orbs" src="assets/orbs.png" height="14%">${x.orbs}` : ""}
			</h3>

<div class="center" style="position:absolute; top: ${6.5 + (y * 33.5) + (!x.coins ? 2.5 : 0)}%; left: 4.4%; transform:scale(0.82); height: 10%; width: 12.5%;">
	<img class="help spaced" title="${x.difficulty || ""}" src="${diffSrc}" height="150%" style="margin-bottom: 0%; position: relative; z-index: 1; ${x.difficultyFace && x.difficultyFace.includes('mythic') ? 'transform:scale(1.45);' : x.difficultyFace && x.difficultyFace.includes('legendary') ? 'transform:scale(1.45);' : x.difficultyFace && x.difficultyFace.includes('epic') ? 'transform:scale(1.25);' : x.difficultyFace && x.difficultyFace.includes('featured') ? 'transform:scale(1.1);' : ''}">
	<h3 style="margin-top:0.8vh; position: relative; z-index: 2;">
		${(x.difficulty || "").includes('Demon') ? "Demon" : (x.difficulty || "")}
	</h3>
	${x.stars > 0 ? `<h3 class="help" title="${x.stars} star${x.stars == 1 ? "" : "s"}" style="position: relative; z-index: 2;">${x.stars}<img class="valign sideSpaceB" src="assets/star.png" height="35%" style="transform:translateY(-8%)"></h3>` : ""}
	${x.coins > 0 ? `<div style="margin-top: 3%; position: relative; z-index: 2;">
		<img src="assets/${x.verifiedCoins ? 'silver' : 'brown'}coin.png" height="50%" class="help">
		${x.coins > 1 ? `<img src="assets/${x.verifiedCoins ? 'silver' : 'brown'}coin.png" height="50%" class="help squeezeB">` : ""}
		${x.coins > 2 ? `<img src="assets/${x.verifiedCoins ? 'silver' : 'brown'}coin.png" height="50%" class="help squeezeB">` : ""}
	</div>` : ""}
</div>

			<div class="center" style="position:absolute; right: 7%; transform:translateY(-16.25vh); height: 10%">
				${viewBtn}${removeBtn}
				<p title="Level ID" style="text-align: right; color: rgba(0, 0, 0, 0.4); font-size: 2.2vh; transform: translate(2.8vh, 2.5vh)">#${x.id}</p>
			</div>
		</div>`)
	})
	$('#searchBox').append('<div style="height: 4.5%"></div>')
}
}

backfillSaved()

function removeSaved(e, id) {
	e.stopPropagation()
	saved = saved.filter(s => String(s.id) !== String(id))
	localStorage.setItem('wdSavedLevels', JSON.stringify(saved))
	location.reload()
}

$('#purgeSaved').click(function() {
	localStorage.removeItem('wdSavedLevels')
	location.reload()
})

$('.closeWindow').click(function() { $(".popup").attr('style', 'display: none;') })

$(document).keydown(function(k) {
	if (k.keyCode == 27) {
		if ($('.popup').is(':visible')) $('.popup').hide()
		else window.parent.postMessage({type:'WD_CLOSE_SEARCH'},'*')
	}
})

$(window).resize(function() {
	if (window.innerHeight > window.innerWidth - 75) $('#everything').hide()
	else $('#everything').show()
})
$(document).ready(function() { $(window).trigger('resize') })

</script>
